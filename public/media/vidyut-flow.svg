<svg width="880" height="495" viewBox="0 0 880 495" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Representative document intelligence pipeline">
  <style>
    .ln{stroke:#8b8a84;stroke-width:1.4}
    .lf{stroke:#8b8a84;stroke-width:1.4;opacity:.4}
    .fl{fill:#8b8a84;opacity:.12}
    .ff{fill:#8b8a84;opacity:.3}
    .ac{stroke:#46a06a;stroke-width:1.6}
    .acf{fill:#46a06a;opacity:.16}
    .acs{fill:#46a06a}
  </style>
  <rect x="40.7" y="40.7" width="798.6" height="413.6" rx="14" class="ln" fill="none"/>
  <defs>
    <marker id="b" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6" fill="none" stroke="#8b8a84" stroke-width="1.6"/>
    </marker>
  </defs>

  <!-- document -->
  <g transform="translate(96,170)">
    <path d="M0 0 h84 l24 24 v132 h-108 z" class="ln" fill="none"/>
    <path d="M84 0 v24 h24" class="lf" fill="none"/>
    <rect x="16" y="44" width="76" height="6" rx="3" class="fl"/>
    <rect x="16" y="62" width="60" height="6" rx="3" class="fl"/>
    <rect x="16" y="80" width="72" height="6" rx="3" class="fl"/>
    <rect x="16" y="98" width="50" height="6" rx="3" class="fl"/>
  </g>
  <text x="110" y="362" fill="#8b8a84" opacity=".6" font-family="monospace" font-size="12">document</text>

  <path d="M232 256 L 320 256" class="ln" fill="none" marker-end="url(#b)"/>

  <!-- extract node (LLM/OCR) -->
  <rect x="332" y="206" width="160" height="100" rx="12" class="ac" fill="none"/>
  <rect x="332" y="206" width="160" height="100" rx="12" class="acf"/>
  <text x="412" y="252" fill="#46a06a" font-family="monospace" font-size="13" text-anchor="middle">LLM · OCR</text>
  <text x="412" y="272" fill="#46a06a" opacity=".7" font-family="monospace" font-size="11" text-anchor="middle">extract</text>

  <path d="M504 256 L 592 256" class="ln" fill="none" marker-end="url(#b)"/>

  <!-- fields -->
  <rect x="604" y="176" width="180" height="70" rx="10" class="ln" fill="none"/>
  <rect x="620" y="194" width="60" height="7" rx="3.5" class="ff"/>
  <rect x="700" y="194" width="68" height="7" rx="3.5" class="fl"/>
  <rect x="620" y="214" width="48" height="7" rx="3.5" class="ff"/>
  <rect x="700" y="214" width="68" height="7" rx="3.5" class="fl"/>

  <!-- decision -->
  <rect x="604" y="266" width="180" height="56" rx="10" class="ac" fill="none"/>
  <circle cx="632" cy="294" r="13" class="ac" fill="none"/>
  <path d="M626 294 l5 5 l9 -10" class="ac" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="656" y="299" fill="#46a06a" font-family="monospace" font-size="12">decision</text>

  <path d="M694 246 L 694 266" class="lf" fill="none"/>

  <!-- timing chip -->
  <rect x="332" y="372" width="200" height="30" rx="8" class="fl"/>
  <text x="348" y="392" fill="#8b8a84" font-family="monospace" font-size="13">2–3 min → &lt;30s</text>
</svg>
